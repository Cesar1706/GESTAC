<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Activo — GESTAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../recursos/css/base.css">
    <link rel="stylesheet" href="../recursos/css/componentes.css">
    <link rel="stylesheet" href="../recursos/css/paginas.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body style="background-image: url('../IMG/fondo.png'); background-repeat: no-repeat; background-size: cover; background-position: center;">

    <div class="contenedor">
        <header class="encabezado" style="position: relative;">
            <button class="btn-volver" onclick="history.back()">←</button>
            <h1 class="titulo-pagina">MODIFICAR ACTIVO</h1>
        </header>

        <div class="cuerpo-pagina">
            <div class="encabezado-lista">
                <h2 class="titulo-lista">Lista de Activos</h2>
                <div class="barra-controles">
                    <div class="caja-busqueda">
                        <span class="icono-busqueda">🔎</span>
                        <input type="text" id="searchInput" placeholder="Buscar activo">
                    </div>
                    <div class="desplegable">
                        <select id="tipoFilter">
                            <option value="todos">Todos</option>
                        </select>
                    </div>
                    <button id="btnDescargarPlantilla" class="btn-exportar">Plantilla</button>
                    <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none">
                    <button id="btnImportarExcel" class="btn-principal" onclick="document.getElementById('importFile').click()">Importar</button>
                </div>
            </div>

            <div class="contenedor-tabla">
                <table class="tabla-activos">
                    <thead>
                        <tr>
                            <th class="col-id">ID Producto</th>
                            <th class="col-titulo">Modelo</th>
                            <th class="col-categoria">Categoría</th>
                            <th class="col-procesador">Procesador</th>
                            <th class="col-caracteristicas">Características</th>
                            <th class="col-lote">Lote</th>
                            <th class="col-editar">Editar</th>
                        </tr>
                    </thead>
                    <tbody id="assets-data">
                        <tr><td colspan="7" style="text-align:center;padding:20px">Cargando activos...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pie-tabla">
                <span class="pagination-info">Mostrando Activos 0 de 0</span>
            </div>
        </div>
    </div>

    <!-- Modal Editar Activo -->
    <div id="modalEditarActivo" class="modal">
        <div class="modal-contenido">
            <h2>Editar Activo</h2>
            <form id="formEditarActivo" method="POST">
                <input type="hidden" name="id_producto" id="edit-id_producto">
                <div class="formulario-cuadricula">
                    <div>
                        <label>Número de Serie (ID Producto)</label>
                        <input type="text" id="edit-id_producto_display" readonly style="background:#e9ecef;cursor:not-allowed">
                    </div>
                    <div>
                        <label>Categoría de activo</label>
                        <select name="categoria" id="edit-categoria" required>
                            <option value="Laptop">Laptop</option>
                            <option value="PC">PC</option>
                            <option value="All in one">All in one</option>
                        </select>
                    </div>
                    <div class="ancho-completo">
                        <label>Número de Lote</label>
                        <input type="text" name="lote">
                    </div>
                    <div>
                        <label>Nombre del producto</label>
                        <input type="text" name="nombre">
                    </div>
                    <div class="ancho-completo">
                        <label>Descripción del activo</label>
                        <textarea name="descripcion"></textarea>
                    </div>
                    <div>
                        <label>Marca</label>
                        <input type="text" name="marca">
                    </div>
                    <div>
                        <label>Procesador</label>
                        <input type="text" name="procesador">
                    </div>
                    <div>
                        <label>Almacenamiento</label>
                        <input type="text" name="almacenamiento">
                    </div>
                    <div>
                        <label>RAM</label>
                        <input type="text" name="ram">
                    </div>
                </div>
                <div class="formulario-botones">
                    <button type="button" id="cancelarEditar">Cancelar</button>
                    <button type="submit" id="guardarCambios">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../recursos/js/peticiones.js"></script>
    <script src="../recursos/js/activos.js"></script>
</body>
</html>
